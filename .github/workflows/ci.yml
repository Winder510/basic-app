name: Live CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Server Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/be-basic-app:lastest ./server
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/be-basic-app:lastest

      - name: Build and Push Client Image
        run: |
          docker build \
            --build-arg VITE_BACK_END_URL="" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/fe-basic-app:lastest ./client
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fe-basic-app:lastest
