name: Live CD

on:
  push:
    branches: [ "live" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Server Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/server-live:lasted ./server
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/server-live:lasted

    - name: Build and Push Client Image
      run: |
        docker build \
          --build-arg VITE_BACK_END_URL="" \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/client-live:lasted ./client
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/client-live:lasted

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Deploy to AWS ECS
      run: |
        echo "Updating ECS Services..."
        # Update Backend Service
        aws ecs update-service --cluster ${{ secrets.CLUSTER_NAME }} --service ${{ secrets.BE_LIVE_SERVICE }} --force-new-deployment
        # Update Frontend Service
        aws ecs update-service --cluster ${{ secrets.CLUSTER_NAME }} --service ${{ secrets.FE_LIVE_SERVICE }} --force-new-deployment
        echo "Deployment triggered successfully."

    - name: Send Email Notification
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Deployment to Live Successful
        to: fongg.service@gmail.com
        from: 'CI/CD Bot <${{ secrets.MAIL_USERNAME }}>'
        body: The latest code has been successfully deployed to the Live environment.
